name: Check PR source branch

on:
  pull_request:
    branches:
      - main

jobs:
  check-source:
    name: check-source
    runs-on: ubuntu-latest
    steps:
      - name: Validate source branch
        run: |
          ALLOWED_BRANCH="develop"
          SOURCE_BRANCH="${{ github.head_ref }}"

          echo "Source branch : ${SOURCE_BRANCH}"
          echo "Allowed branch: ${ALLOWED_BRANCH}"

          if [ "${SOURCE_BRANCH}" != "${ALLOWED_BRANCH}" ]; then
            echo ""
            echo "ERROR: Pull requests into 'main' must originate from '${ALLOWED_BRANCH}'."
            echo "       Received: '${SOURCE_BRANCH}'"
            exit 1
          fi

          echo "OK: Source branch is '${SOURCE_BRANCH}'. Proceeding."
