version: '3.8'
services:
  mc:
    image: itzg/minecraft-server:latest
    container_name: lightshop-mc
    environment:
      EULA: 'TRUE'
      TYPE: 'PAPER'
      VERSION: '1.20.1'
      ONLINE_MODE: 'false'
      MEMORY: '2G'
    ports:
      - '25565:25565'
    volumes:
      - ./plugins:/data/plugins
